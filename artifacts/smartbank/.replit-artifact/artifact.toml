kind = "web"
previewPath = "/"
title = "SmartBank"
version = "1.0.0"
id = "artifacts/smartbank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23380

[services.development]
run = "pnpm --filter @workspace/smartbank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartbank", "run", "build" ]
publicDir = "artifacts/smartbank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23380"
BASE_PATH = "/"
